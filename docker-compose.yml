name: psychai

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: psychai
      POSTGRES_USER: psychai
      POSTGRES_PASSWORD: psychai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
